<!DOCTYPE html>
<html>
<head>
    <title>Welcome Message</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        input {
            padding: 5px;
            margin-right: 10px;
            font-size: 20px;
            box-sizing: border-box;
            box-shadow: 6px 2px 4px rgba(119, 111, 111, 0.546);
        }
        button {
            padding: 5px 10px;
            width: 85px;
            box-sizing: border-box;
            box-shadow: 6px 2px 4px rgba(119, 111, 111, 0.546);
        }
        h2 {
            color:rgb(37, 36, 36);
        }
        </style>
</head>
<body>

<h2>What is your name?</h2>

<input type="text" id="username" placeholder="Laurence Svekis">
<button onclick="showMessage()">Submit</button>

<p id="result"></p>

<script>
function showMessage() {
    let name = document.getElementById("username").value;

    if(name.length <= 6){
        alert("Name must be more than 6 characters.");
        return;
    }

    document.getElementById("result").innerHTML =
        "Welcome " + name + " ";
}
</script>

</body>
</html>
