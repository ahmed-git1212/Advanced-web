<!DOCTYPE html>
<html>
<head>
    <title>Population Array</title>
</head>

<body>

<h2>Population Array Program</h2>

<p id="result"></p>

<script>

function percentageOfWorld1(population){
    return (population / 7900) * 100;
}

let populations = [65, 55, 49, 1441];

let checkArray = populations.length === 4;

let percentages = [
    percentageOfWorld1(populations[0]),
    percentageOfWorld1(populations[1]),
    percentageOfWorld1(populations[2]),
    percentageOfWorld1(populations[3])
];

document.getElementById("result").innerHTML =
"<b>Array has 4 elements:</b> " + checkArray +
"<br><br>" +

"<b>Populations:</b><br>" +
"[" + populations[0] + ", " +
populations[1] + ", " +
populations[2] + ", " +
populations[3] + "]" +

"<br><br>" +

"<b>Percentages:</b><br>" +
"[" + percentages[0] + ",<br>" +
percentages[1] + ",<br>" +
percentages[2] + ",<br>" +
percentages[3] + "]";
    
</script>

</body>
</html>
