<!DOCTYPE html>
<html>
<head>
    <title>Employee Registration</title>
</head>
<body style="font-family: sans-serif;">

    <form style="background-color: #bcbcbc; padding: 20px; width: 700px; border: 1px solid black;">
        <h2 align="center"><i>Employee Data</i></h2>
        
        <table width="100%" cellpadding="5">
            <tr>
                <td>Employee ID:</td>
                <td><input type="text" value="102"></td>
                <td>Birth Date:</td>
                <td><input type="text" value="06/05/1962"></td>
            </tr>
            <tr>
                <td>Manager ID:</td>
                <td><input type="text" value="501"></td>
                <td>Soc. Sec. No.:</td>
                <td><input type="text" value="017-34-9033"></td>
            </tr>
            <tr>
                <td>Emp. First Name:</td>
                <td><input type="text" value="Fran"></td>
                <td>Salary:</td>
                <td><input type="text" value="$45,700.00"></td>
            </tr>
            <tr>
                <td>Emp. Last Name:</td>
                <td><input type="text" value="Whitney"></td>
                <td>Start Date:</td>
                <td><input type="text" value="02/26/1990"></td>
            </tr>
            <tr>
                <td>Department ID:</td>
                <td><input type="text" value="100"></td>
                <td>Termination Date:</td>
                <td><input type="text" value="00/00/0000"></td>
            </tr>
            <tr>
                <td>Street:</td>
                <td colspan="2"><input type="text" value="49 East Washington Street" style="width: 90%;"></td>
                <td rowspan="3" valign="top">
                    Status:<br>
                    <input type="radio" name="status" checked> Active<br>
                    <input type="radio" name="status"> Terminated<br>
                    <input type="radio" name="status"> On Leave
                </td>
            </tr>
            <tr>
                <td>City:</td>
                <td><input type="text" value="Needham"></td>
            </tr>
            <tr>
                <td>State:</td>
                <td><input type="text" value="MA" style="width: 40px;"></td>
            </tr>
            <tr>
                <td>Zip Code:</td>
                <td><input type="text" value="02192-"></td>
                <td>Health Insurance:</td>
                <td><input type="checkbox" checked></td>
            </tr>
            <tr>
                <td>Phone:</td>
                <td><input type="text" value="(617) 555-3985"></td>
                <td>Life Insurance:</td>
                <td><input type="checkbox" checked></td>
            </tr>
            <tr>
                <td>Sex:</td>
                <td>
                    <input type="radio" name="sex"> Male<br>
                    <input type="radio" name="sex" checked> Female
                </td>
                <td>Day Care:</td>
                <td><input type="checkbox"></td>
            </tr>
        </table>
    </form>

</body>
</html>
